substitutions:
  device_name: ceilsense
  friendly_name: "CeilSense"
  ceilsense_hardware_version: "v1-complete-eth"
  wifi_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-wifi-manifest.json"
  eth_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-eth-manifest.json"
  wifi_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-wifi-cloud-manifest.json"
  eth_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-eth-cloud-manifest.json"
  default_network: "Ethernet + SmartHomeShop App (cloud)"
  cloud_enabled: "true"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

packages:
  base: !include base.yaml
  net: !include eth.yaml
  cloud: !include packages/cloud_core.yaml
  cloud_air: !include packages/cloud_scd4x.yaml
  scd4x: !include packages/scd4x.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ceilsense/ceilsense-v1/ceilsense-complete-eth-cloud.yaml@main
  import_full_config: false
