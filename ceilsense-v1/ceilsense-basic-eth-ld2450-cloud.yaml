substitutions:
  device_name: ceilsense
  friendly_name: "CeilSense"
  ceilsense_hardware_version: "v1-basic-eth-ld2450"
  wifi_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-wifi-ld2450-manifest.json"
  eth_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-eth-ld2450-manifest.json"
  wifi_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-wifi-ld2450-cloud-manifest.json"
  eth_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-eth-ld2450-cloud-manifest.json"
  default_network: "Ethernet + SmartHomeShop App (cloud)"
  cloud_enabled: "true"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

packages:
  base: !include base.yaml
  net: !include eth.yaml
  cloud: !include packages/cloud_core.yaml
  cloud_presence: !include packages/cloud_ld2450.yaml
  ld2450: !include packages/ld2450.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/ceilsense/ceilsense-v1/ceilsense-basic-eth-ld2450-cloud.yaml@main
  import_full_config: false
