# CeilSense LD2450 integration.
#
# Radar entities keep their original CeilSense ids through the shared product
# profile. Polygon zones and entry lines use the central SmartHomeShop engine.

substitutions:
  ceilsense_ld2450_uart_tx_pin: GPIO13
  ceilsense_ld2450_uart_rx_pin: GPIO14
  room_designer_target_count: "3"
  room_designer_coordinate_scale: "1.0f"
  room_designer_target_1_x_id: target1_x
  room_designer_target_1_y_id: target1_y
  room_designer_target_2_x_id: target2_x
  room_designer_target_2_y_id: target2_y
  room_designer_target_3_x_id: target3_x
  room_designer_target_3_y_id: target3_y
  room_designer_target_4_x_id: target3_x
  room_designer_target_4_y_id: target3_y
  room_designer_target_5_x_id: target3_x
  room_designer_target_5_y_id: target3_y

packages:
  shared_ceilsense_ld2450: github://smarthomeshop/ld2450/packages/ld2450-ceilsense.yaml@main
  shared_ld2450_zones: github://smarthomeshop/ld2450/packages/ld2450-polygon-zones.yaml@main
