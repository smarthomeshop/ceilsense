interval:
  - interval: 10s
    then:
      - lambda: |-
          id(cloud_has_presence) = true;
          id(cloud_occupancy) = id(presence).state;
          id(cloud_has_zone_occupancy) = true;
          id(cloud_has_zone_counts) = true;

          const int zone1Count = id(zone1_target_count).has_state() && !isnan(id(zone1_target_count).state)
            ? (int) roundf(id(zone1_target_count).state)
            : 0;
          const int zone2Count = id(zone2_target_count).has_state() && !isnan(id(zone2_target_count).state)
            ? (int) roundf(id(zone2_target_count).state)
            : 0;
          const int zone3Count = id(zone3_target_count).has_state() && !isnan(id(zone3_target_count).state)
            ? (int) roundf(id(zone3_target_count).state)
            : 0;

          id(cloud_zone1_target_count) = zone1Count;
          id(cloud_zone2_target_count) = zone2Count;
          id(cloud_zone3_target_count) = zone3Count;
          id(cloud_zone4_target_count) = -1;

          id(cloud_zone1_occupancy) = zone1Count > 0;
          id(cloud_zone2_occupancy) = zone2Count > 0;
          id(cloud_zone3_occupancy) = zone3Count > 0;
          id(cloud_zone4_occupancy) = false;
