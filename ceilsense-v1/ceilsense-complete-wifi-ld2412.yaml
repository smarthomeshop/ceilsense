# Complete WiFi + LD2412 required (SCD4x required)
substitutions:
  device_name: ceilsense
  friendly_name: "CeilSense"
  ceilsense_hardware_version: "v1-complete-wifi-ld2412"
  wifi_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-wifi-ld2412-manifest.json"
  eth_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-eth-ld2412-manifest.json"
  wifi_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-wifi-ld2412-cloud-manifest.json"
  eth_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-complete-eth-ld2412-cloud-manifest.json"
  default_network: "WiFi (local)"
  cloud_enabled: "false"
  # SmartHomeShop setup portal
  setup_product_name: "CeilSense"
  setup_product_variant: "V1 Complete WiFi LD2412"
  setup_support_cloud: "true"
  setup_support_home_assistant: "true"
  setup_support_mqtt: "false"
  setup_support_homey: "false"
  setup_support_ethernet: "true"
  setup_support_firmware_selector: "true"
  setup_default_cloud_enabled: "false"
  setup_default_home_assistant_enabled: "true"
  setup_default_mqtt_enabled: "false"
  setup_firmware_options: "WiFi (local)|Ethernet (local)|WiFi + SmartHomeShop App (cloud)|Ethernet + SmartHomeShop App (cloud)"
  setup_default_firmware_option: ${default_network}

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

packages:
  base: !include base.yaml
  net: !include wifi.yaml
  ld2412: !include packages/ld2412.yaml
  scd4x: !include packages/scd4x.yaml
  setup_portal: github://smarthomeshop/setup-portal/packages/setup-portal.yaml@main
  setup_portal_bridge: github://smarthomeshop/setup-portal/packages/firmware-selector-bridge.yaml@main

dashboard_import:
  package_import_url: github://smarthomeshop/ceilsense/ceilsense-v1/ceilsense-complete-wifi-ld2412.yaml@main
  import_full_config: false
