substitutions:
  device_name: ceilsense
  friendly_name: "CeilSense"
  ceilsense_hardware_version: "v1-basic-wifi"
  wifi_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-wifi-manifest.json"
  eth_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-eth-manifest.json"
  wifi_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-wifi-cloud-manifest.json"
  eth_cloud_update_manifest_url: "https://smarthomeshop.github.io/ceilsense/ceilsense-basic-eth-cloud-manifest.json"
  default_network: "WiFi + SmartHomeShop App (cloud)"
  cloud_enabled: "true"
  # SmartHomeShop setup portal
  setup_product_name: "CeilSense"
  setup_product_variant: "V1 Basic WiFi Cloud"
  setup_support_cloud: "true"
  setup_support_home_assistant: "true"
  setup_support_mqtt: "false"
  setup_support_homey: "false"
  setup_support_ethernet: "true"
  setup_support_firmware_selector: "true"
  setup_default_cloud_enabled: "true"
  setup_default_home_assistant_enabled: "true"
  setup_default_mqtt_enabled: "false"
  setup_firmware_options: "WiFi (local)|Ethernet (local)|WiFi + SmartHomeShop App (cloud)|Ethernet + SmartHomeShop App (cloud)"
  setup_default_firmware_option: ${default_network}

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

packages:
  base: !include base.yaml
  net: !include wifi.yaml
  cloud: !include packages/cloud_core.yaml
  setup_portal: github://smarthomeshop/setup-portal/packages/setup-portal.yaml@main
  setup_portal_bridge: github://smarthomeshop/setup-portal/packages/firmware-selector-bridge.yaml@main

dashboard_import:
  package_import_url: github://smarthomeshop/ceilsense/ceilsense-v1/ceilsense-basic-wifi-cloud.yaml@main
  import_full_config: false
